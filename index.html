<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Todo Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="container">
  <article data-testid="test-todo-card" class="card">

    <!-- Priority Indicator -->
    <div data-testid="test-todo-priority-indicator" id="priority-indicator" class="priority-bar high"></div>

    <!-- VIEW MODE -->
    <div id="view-mode">

      <div class="header">
        <div>
          <h2 data-testid="test-todo-title" id="title">Design Landing Page</h2>
          <p data-testid="test-todo-description" id="description">
            This is a long description that can be expanded or collapsed depending on user interaction.
          </p>
        </div>

        <input 
          type="checkbox"
          id="checkbox"
          data-testid="test-todo-complete-toggle"
          aria-label="Mark task complete"
        />
      </div>

      <!-- Status Control -->
      <select data-testid="test-todo-status-control" id="status-control" aria-label="Task status">
        <option>Pending</option>
        <option selected>In Progress</option>
        <option>Done</option>
      </select>

      <div class="meta">
        <span data-testid="test-todo-priority" id="priority">High</span>
        <span data-testid="test-todo-status" id="status">In Progress</span>
      </div>

      <!-- Dates -->
      <div class="dates">
        <time data-testid="test-todo-due-date" id="due-date"></time>
        <div data-testid="test-todo-time-remaining" id="time-remaining" aria-live="polite"></div>
        <span data-testid="test-todo-overdue-indicator" id="overdue" class="hidden">Overdue</span>
      </div>

      <!-- Expand -->
      <button 
        data-testid="test-todo-expand-toggle"
        id="expand-btn"
        aria-expanded="false"
        aria-controls="collapsible"
      >
        Expand
      </button>

      <div 
        data-testid="test-todo-collapsible-section"
        id="collapsible"
        class="collapsed"
      ></div>

      <!-- Actions -->
      <div class="actions">
        <button data-testid="test-todo-edit-button" id="edit-btn">Edit</button>
        <button data-testid="test-todo-delete-button" id="delete-btn">Delete</button>
      </div>

    </div>

    <!-- EDIT MODE -->
    <form data-testid="test-todo-edit-form" id="edit-form" class="hidden">

      <label for="edit-title">Title</label>
      <input data-testid="test-todo-edit-title-input" id="edit-title" />

      <label for="edit-desc">Description</label>
      <textarea data-testid="test-todo-edit-description-input" id="edit-desc"></textarea>

      <label for="edit-priority">Priority</label>
      <select data-testid="test-todo-edit-priority-select" id="edit-priority">
        <option>Low</option>
        <option>Medium</option>
        <option selected>High</option>
      </select>

      <label for="edit-date">Due Date</label>
      <input type="datetime-local" data-testid="test-todo-edit-due-date-input" id="edit-date" />

      <div class="actions">
        <button type="button" data-testid="test-todo-save-button" id="save-btn">Save</button>
        <button type="button" data-testid="test-todo-cancel-button" id="cancel-btn">Cancel</button>
      </div>

    </form>

  </article>
</main>

<script src="script.js"></script>
</body>
</html>
