<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    <article data-testid="test-todo-card" class="card">

      <!-- Header -->
      <div class="header">
        <div>
          <h2 data-testid="test-todo-title" id="todo-title">
            Design Landing Page
          </h2>
          <p data-testid="test-todo-description">
            Create a modern responsive landing page for a product.
          </p>
        </div>

        <input 
          type="checkbox"
          data-testid="test-todo-complete-toggle"
          id="complete-toggle"
          aria-label="Mark task complete"
        />
      </div>

      <!-- Priority & Status -->
      <div class="meta">
        <span data-testid="test-todo-priority" class="badge high">High</span>
        <span data-testid="test-todo-status" id="status" class="badge progress">
          In Progress
        </span>
      </div>

      <!-- Dates -->
      <div class="dates">
        <time data-testid="test-todo-due-date" id="due-date"></time>
        <time data-testid="test-todo-time-remaining" id="time-remaining"></time>
      </div>

      <!-- Tags -->
      <div data-testid="test-todo-tags" class="tags">
        <span data-testid="test-todo-tag-work">work</span>
        <span data-testid="test-todo-tag-urgent">urgent</span>
        <span>design</span>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button data-testid="test-todo-edit-button">Edit</button>
        <button data-testid="test-todo-delete-button">Delete</button>
      </div>

    </article>
  </main>

  <script src="script.js"></script>
</body>
</html>
